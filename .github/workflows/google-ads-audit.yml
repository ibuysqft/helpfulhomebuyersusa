name: Google Ads 3-Day Flywheel Audit

on:
  schedule:
    # Every 3 days at 8am ET (13:00 UTC) — days 1,4,7,10,...
    - cron: '0 13 */3 * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days of data to analyze'
        required: false
        default: '7'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Run Google Ads audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: '9621034521'
          GOOGLE_ADS_MANAGER_ID: '6295789660'
          DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
          NOTIFICATION_EMAIL: 'anchor.offer@gmail.com'
        run: npx tsx scripts/google-ads-audit.ts

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-ads-audit-${{ github.run_number }}
          path: /tmp/google-ads-audit-*.md
          retention-days: 90
